<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimbursements Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── AUTH VIEW ──────────────────────────────────────────────────────── -->
  <div id="auth-view" class="auth-container hidden">
    <div class="glass-card auth-card fade-in">
      
      <div class="auth-header">
        <h1 id="auth-title" class="text-gradient">Welcome Back</h1>
        <p id="auth-subtitle">Sign in to your account</p>
      </div>

      <!-- Login Section -->
      <div id="login-section">
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="name@org.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <div class="auth-footer">
          Don't have an account? <a href="#" id="switch-to-register">Register here</a>
        </div>
      </div>

      <!-- Register Section -->
      <div id="register-section" class="hidden">
        <form id="register-form">
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" placeholder="Rahul Sharma" required>
          </div>
          <div class="form-group">
            <label for="register-email">Email Address (@org.com only)</label>
            <input type="email" id="register-email" placeholder="name@org.com" required>
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <div class="auth-footer">
          Already have an account? <a href="#" id="switch-to-login">Sign in</a>
        </div>
      </div>

    </div>
  </div>

  <!-- ── DASHBOARD VIEW ──────────────────────────────────────────────────── -->
  <div id="dashboard-view" class="dashboard-layout hidden fade-in">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2 class="text-gradient">ReimburseApp</h2>
      </div>
      
      <div class="sidebar-user">
        <div id="user-name" class="user-name">User Name</div>
        <div id="user-email" class="user-email">user@org.com</div>
        <div id="user-role-badge" style="margin-top: 0.25rem;"></div>
      </div>
      
      <nav id="sidebar-nav" class="sidebar-nav">
        <!-- Links injected by JS -->
      </nav>
      
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-reject btn-full">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="dashboard-content">
        <!-- Section content injected by JS -->
      </div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
